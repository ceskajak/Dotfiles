# ~/.tmux.conf — managed by chezmoi.
# NOTE (2026-07-16, NON-FINAL): the tpm plugin-manager init is guarded so it
# no-ops when tpm isn't installed (currently missing on ocean, akvarium). The
# @plugin lines are harmless without tpm. Proper tmux theme/plugin setup +
# bootstrapper deferred — see [[dotfiles]]. Nothing here installs anything.

# change the prefix from 'C-b' to 'C-a'
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# split panes using | and -, open in the same path
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# open new windows in the current path
bind c new-window -c "#{pane_current_path}"

# reload config file
bind r source-file ~/.tmux.conf

unbind p
bind p previous-window

# shorten command delay
set -sg escape-time 1

# don't rename windows automatically
set -g allow-rename off

# mouse control
set-option -g mouse on
set-option -s set-clipboard off
bind -T root MouseDown2Pane run -b "xclip -o | tmux load-buffer - && tmux paste-buffer -s ' '"
bind m set-option mouse\; display-message "Mouse is now #{?mouse,on,off}"

# Alt-arrow to switch panes
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# vi mode keys
set-window-option -g mode-keys vi

# 256 colors
set -g default-terminal "screen-256color"

# menu of URLs from the visible pane
bind u capture-pane \;\
    save-buffer /tmp/tmux-buffer \;\
    split-window -l 10 "urlview /tmp/tmux-buffer"

#########
# PLUGINS
#########
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'catppuccin/tmux'
set -g @catppuccin_flavour 'frappe'

# Initialize tpm — only if installed (guarded so tmux doesn't error when missing)
if-shell "test -d ~/.tmux/plugins/tpm" "run '~/.tmux/plugins/tpm/tpm'"
